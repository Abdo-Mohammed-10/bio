name: Deploy Portfolio

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPO: ${{ secrets.ECR_REPOSITORY_URL }}
  CLUSTER_NAME: portfolio-cluster
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    environment: "sec bio"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        run: |
          docker build -t ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }} ${{ env.ECR_REPO }}:latest
          docker push ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REPO }}:latest

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: "sec bio"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: List all resources
        run: |
          echo "=== All Deployments ==="
          kubectl get deployments -A
          echo ""
          echo "=== All Pods ==="
          kubectl get pods -A
          echo ""
          echo "=== All Services ==="
          kubectl get services -A

      - name: Update image in deployment
        run: |
          # جرب في default namespace
          kubectl set image deployment/portfolio \
            portfolio=${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }} \
            --namespace=default || \
          # جرب في كل namespaces لو ملقاش
          kubectl set image deployment/portfolio \
            portfolio=${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }} \
            --namespace=portfolio || \
          # لو لسه ملقاش، اطبع رسالة
          echo "⚠️ Deployment 'portfolio' not found in any namespace"

      - name: Wait for rollout (if deployment exists)
        run: |
          kubectl rollout status deployment/portfolio \
            --namespace=default \
            --timeout=120s || true

      - name: Get ALB URL
        run: |
          echo "🌍 Portfolio live at:"
          kubectl get ingress -A -o jsonpath='{.items[*].status.loadBalancer.ingress[0].hostname}' || echo "No ingress found"
